{% extends "base.html" %}
{% block content %}
<form method="POST">
    {% csrf_token %}
    <!-- Errores globales del formulario -->
    {% if form.non_field_errors %}
    <div class="alert alert-danger">
        <ul>
            {% for error in form.non_field_errors %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}


    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        Actualizar Reservación
    </button>
</form>
{% endblock %}
