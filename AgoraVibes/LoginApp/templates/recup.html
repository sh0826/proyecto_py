{% extends 'base.html' %}
{% block titulo %}Recuperar Contraseña{% endblock %}

{% block content %}
<style>
    .auth-card {
        max-width: 500px;
        margin: 60px auto;
        padding: 40px;
        background: #0a0a0a;
        border: 1px solid #b7a607;
        border-radius: 4px;
        color: #fff;
    }
    .auth-title {
        font-family: 'Bangers';
        font-size: 2.5rem;
        color: #d32f2f;
        text-align: center;
        margin-bottom: 25px;
        letter-spacing: 2px;
    }

    .auth-card .form-control {
        background: transparent !important;
        border: none !important;
        border-bottom: 1px solid #333 !important;
        color: #fff !important;
        border-radius: 0 !important;
        padding: 10px 5px !important;
        margin-bottom: 20px !important;
    }
    .auth-card .form-control:focus {
        border-bottom: 1px solid #d32f2f !important;
        box-shadow: none !important;
    }
    .auth-card label {
        font-size: 0.85rem;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .btn-auth {
        background: #d32f2f !important;
        border: none !important;
        color: #fff !important;
        font-weight: bold;
        padding: 12px;
        width: 100%;
        border-radius: 2px;
        margin-top: 15px;
        transition: opacity 0.3s;
    }
    .btn-auth:hover {
        opacity: 0.8;
    }
    .auth-footer {
        text-align: center;
        margin-top: 25px;
        font-size: 0.9rem;
    }
    .auth-link {
        color: #b7a607;
        text-decoration: none;
        font-weight: 500;
    }
    .auth-link:hover {
        text-decoration: underline;
    }
</style>

<div class="auth-card" data-aos="fade">
    <h1 class="auth-title">RECUPERAR CONTRASEÑA</h1>
    <form action="" method="POST">
        {% csrf_token %}
        <label for="correo">Correo del Usuario</label>
        <input type="email" name="correo" id="correo" class="auth-card form-control" required>
        <div class="auth-footer">
            <div>
                <button type="submit" class="btn-auth">RECUPERAR</button>
            </div>
        </div>
    </form>
</div>
{% if ok == 1 %}
    <h6 class="text-center text-success">{{ msj }}</h6>
    <h6 class="text-center text-success">Por favor revise la Bandeja de Entrada de su Correo</h6>
{% else %}
    <h6 class="text-center text-danger">{{ msj }}</h6>
{% endif %}
<br>
{% endblock %}
